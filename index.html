<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>총무기획팀 구매검색 툴</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root {
    --bg:#0b0f1a;--surface:#111827;--card:#161e2e;--card2:#1c2640;
    --border:#1e2d4a;--accent:#2563eb;--green:#059669;--green-light:#34d399;
    --amber:#d97706;--amber-light:#fbbf24;--text:#e2e8f0;--text2:#94a3b8;--text3:#4b5a72;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:linear-gradient(180deg,#0d1526,#0b0f1a);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;}
  .logo{width:38px;height:38px;background:linear-gradient(135deg,#1d4ed8,#4f46e5);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 0 14px rgba(37,99,235,.4);}
  header h1{font-size:15px;font-weight:700;}
  header p{font-size:11px;color:var(--text2);margin-top:1px;}
  .ver{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.3);color:#60a5fa;padding:3px 10px;border-radius:20px;}
  main{max-width:960px;margin:0 auto;padding:22px 18px;}
  .cat-tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
  .cat-tab{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
  .cat-tab:hover{border-color:var(--accent);color:var(--text);}
  .cat-tab.active{background:rgba(37,99,235,.15);border-color:var(--accent);color:#93c5fd;}
  .search-box{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px;margin-bottom:18px;}
  .search-row{display:flex;gap:9px;align-items:center;}
  .s-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 15px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
  .s-input:focus{border-color:var(--accent);}
  .s-input::placeholder{color:var(--text3);}
  .s-btn{background:linear-gradient(135deg,#1d4ed8,#4338ca);border:none;border-radius:8px;padding:0 22px;height:44px;color:#fff;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s;box-shadow:0 0 10px rgba(37,99,235,.3);}
  .s-btn:hover{opacity:.88;}
  .s-btn:disabled{opacity:.45;cursor:not-allowed;}
  .quick-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
  .qtag{background:transparent;border:1px solid var(--border);border-radius:5px;padding:3px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .12s;}
  .qtag:hover{border-color:#60a5fa;color:#93c5fd;}
  .loading{display:none;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:36px;text-align:center;margin-bottom:18px;}
  .loading.on{display:block;}
  .spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 12px;}
  @keyframes rot{to{transform:rotate(360deg);}}
  .load-steps{display:flex;justify-content:center;gap:18px;margin-top:12px;flex-wrap:wrap;}
  .lstep{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);}
  .lstep.on{color:#60a5fa;}.lstep.done{color:var(--green-light);}
  .ldot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .results{display:none;}.results.on{display:block;}
  .price-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px;}
  .ph-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;}
  .ph-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
  .ph-value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .ph-sub{font-size:10px;color:var(--text2);margin-top:3px;}
  .c-blue{color:#60a5fa;}.c-green{color:var(--green-light);}.c-amber{color:var(--amber-light);}
  .sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
  .sec::after{content:'';flex:1;height:1px;background:var(--border);}
  .prod-list{display:grid;gap:9px;margin-bottom:18px;}
  .prod-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 18px;display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start;position:relative;transition:border-color .15s;}
  .prod-card:hover{border-color:#334e80;}
  .prod-card.rec{border-color:var(--green);background:linear-gradient(135deg,var(--card),#0d2318);}
  .rec-tag{position:absolute;top:-1px;left:16px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:0 0 6px 6px;}
  .prod-rank{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
  .prod-name{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:9px;}
  .specs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px;}
  .spec{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
  .pros-cons{display:flex;flex-direction:column;gap:2px;}
  .pro{font-size:12px;color:var(--green-light);}.con{font-size:12px;color:var(--text2);}
  .rec-reason{margin-top:9px;background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.25);border-radius:6px;padding:7px 11px;font-size:12px;color:#6ee7b7;}
  .price-panel{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px;}
  .price-main-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#60a5fa;margin-bottom:3px;}
  .price-note{font-size:10px;color:var(--text2);margin-bottom:10px;}
  .shops{display:flex;flex-direction:column;gap:5px;}
  .shop-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:6px 9px;text-decoration:none;transition:background .12s,border-color .12s;cursor:pointer;}
  .shop-row:hover{background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.4);}
  .shop-left{display:flex;align-items:center;gap:7px;}
  .shop-icon{font-size:13px;}
  .shop-name{font-size:11px;font-weight:600;color:var(--text);}
  .shop-note-txt{font-size:9px;color:var(--text3);}
  .shop-price-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#60a5fa;}
  .lowest-tag{font-size:9px;font-weight:700;background:var(--green);color:#fff;border-radius:3px;padding:1px 4px;margin-left:3px;}
  .ai-wrap{background:linear-gradient(135deg,#0e1627,#101e35);border:1px solid rgba(37,99,235,.25);border-radius:11px;padding:18px;margin-bottom:18px;}
  .ai-hd{display:flex;align-items:center;gap:9px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border);}
  .ai-icon-box{width:28px;height:28px;background:linear-gradient(135deg,#1d4ed8,#4338ca);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .ai-hd-text .t{font-size:13px;font-weight:700;}.ai-hd-text .s{font-size:10px;color:var(--text2);margin-top:1px;}
  .ai-body{font-size:13px;line-height:1.85;color:#b0c4de;white-space:pre-wrap;}
  .tip-box{margin-top:12px;background:rgba(37,99,235,.08);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:9px 13px;font-size:12px;color:#93c5fd;}
  .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:20px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{background:var(--surface);padding:9px 13px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:1px solid var(--border);}
  td{padding:10px 13px;border-bottom:1px solid rgba(30,45,74,.5);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(255,255,255,.015);}
  .bar-row{display:flex;align-items:center;gap:6px;}
  .bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));}
  .bar-num{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text2);min-width:22px;}
  .empty{text-align:center;padding:52px 20px;background:var(--card);border:1px dashed var(--border);border-radius:13px;color:var(--text2);}
  .empty-icon{font-size:34px;margin-bottom:11px;}
  @media(max-width:620px){.price-hero{grid-template-columns:1fr 1fr;}.prod-card{grid-template-columns:1fr;}.price-panel{margin-top:4px;}}
</style>
</head>
<body>

<header>
  <div class="logo">🛒</div>
  <div>
    <h1>총무기획팀 구매검색 툴</h1>
    <p>품목 입력 → 실시간 최저가 · 사양 · AI 추천 즉시 확인</p>
  </div>
  <div class="ver">v3.0 LIVE</div>
</header>

<main>
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="setCategory(this,'전체')">🔍 전체</button>
    <button class="cat-tab" onclick="setCategory(this,'IT기기')">💻 IT기기</button>
    <button class="cat-tab" onclick="setCategory(this,'사무용품')">📦 사무용품</button>
    <button class="cat-tab" onclick="setCategory(this,'가구/인테리어')">🪑 가구/인테리어</button>
    <button class="cat-tab" onclick="setCategory(this,'시설/설비')">🔧 시설/설비</button>
  </div>

  <div class="search-box">
    <div class="search-row">
      <input class="s-input" id="si" type="text"
        placeholder="모델명 또는 품목 입력 (예: LG 27인치 모니터, 캐논 복합기...)"
        onkeydown="if(event.key==='Enter') go()"/>
      <button class="s-btn" id="sb" onclick="go()">검색 분석 →</button>
    </div>
    <div class="quick-row" id="quickRow"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spin"></div>
    <div style="font-size:12px;color:var(--text2)">실시간 가격 분석 중 (10~15초)...</div>
    <div class="load-steps">
      <span class="lstep" id="ls1"><span class="ldot"></span> 웹검색</span>
      <span class="lstep" id="ls2"><span class="ldot"></span> 가격수집</span>
      <span class="lstep" id="ls3"><span class="ldot"></span> 비교분석</span>
      <span class="lstep" id="ls4"><span class="ldot"></span> 추천생성</span>
    </div>
  </div>

  <div class="results" id="results"></div>

  <div class="empty" id="empty">
    <div class="empty-icon">🔎</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:7px;">품목을 입력하면 바로 분석합니다</div>
    <div style="font-size:12px;">모델명(LG 27GN800) 또는 품목(흑백 레이저프린터)을 입력하세요.<br>실시간 최저가 + 쇼핑몰 링크 + AI 추천을 한 번에 확인합니다.</div>
  </div>
</main>

<script>
// ── Apps Script 프록시 URL ──────────────────────
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyK7ozgmQKZ7FtKygiZOlOVmyLu-9vYTHNUgIprUTxNmyWY0kx92JRNrrH41KY6ySw8/exec';

const QUICK = {
  '전체':        ['LG 27인치 모니터','캐논 복합기','사무용 의자','레이저프린터','맥북 M4 Pro','A4 복사지'],
  'IT기기':      ['LG 27GN800 모니터','삼성 32인치 모니터','맥북 M4 Pro 14인치','HP 레이저젯 Pro','브라더 HL-L2360DN','갤럭시북 Pro'],
  '사무용품':    ['A4 복사용지 500매','볼펜 세트','스테이플러','파일박스','화이트보드 마커','복합기 토너 캐논'],
  '가구/인테리어':['허먼밀러 에어론','시디즈 T50','모션데스크 1200mm','책장 3단','회의용 테이블','소파 2인용'],
  '시설/설비':   ['LED 투광등 50W','배선덕트','에어컨 필터','소화기 3.3kg','CCTV 실내용','UPS 1000VA']
};

const SHOPS = [
  {id:'danawa',   icon:'🖥️', name:'다나와',    note:'최저가 비교몰'},
  {id:'enuri',    icon:'🔍', name:'에누리',    note:'가격비교'},
  {id:'coupang',  icon:'🚀', name:'쿠팡',      note:'로켓배송'},
  {id:'naver',    icon:'🟢', name:'네이버쇼핑', note:'최저가 탭'},
  {id:'gmarket',  icon:'🛍️', name:'G마켓',     note:'스마일배송'},
  {id:'auction',  icon:'🏷️', name:'옥션',      note:'경매/즉구'},
  {id:'compuzone',icon:'💾', name:'컴퓨존',    note:'IT전문몰'}
];

function shopUrl(id, q) {
  const e = encodeURIComponent(q);
  return {
    danawa:    `https://search.danawa.com/dsearch.php?query=${e}`,
    enuri:     `https://www.enuri.com/search.jsp?keyword=${e}`,
    coupang:   `https://www.coupang.com/np/search?q=${e}`,
    naver:     `https://search.shopping.naver.com/search/all?query=${e}`,
    gmarket:   `https://browse.gmarket.co.kr/search?keyword=${e}`,
    auction:   `https://browse.auction.co.kr/search?keyword=${e}`,
    compuzone: `https://www.compuzone.co.kr/search/?SearchStr=${e}`
  }[id];
}

let curCat = '전체';

function setCategory(el, cat) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  curCat = cat;
  renderQuickTags();
  const hints = {
    'IT기기':       '예: LG 27GN800, 맥북 M4 Pro, 갤럭시북...',
    '사무용품':     '예: A4 복사지, 볼펜 세트, 토너...',
    '가구/인테리어':'예: 허먼밀러 에어론, 모션데스크...',
    '시설/설비':    '예: LED 투광등, 소화기, UPS...',
    '전체':         '모델명 또는 품목 입력 (예: LG 27인치 모니터, 캐논 복합기...)'
  };
  document.getElementById('si').placeholder = hints[cat] || hints['전체'];
}

function renderQuickTags() {
  document.getElementById('quickRow').innerHTML =
    (QUICK[curCat] || QUICK['전체']).map(t =>
      `<span class="qtag" onclick="qs('${t}')">${t}</span>`
    ).join('');
}

function qs(q) { document.getElementById('si').value = q; go(); }

function go() {
  const q = document.getElementById('si').value.trim();
  if (!q) return;
  document.getElementById('sb').disabled = true;
  document.getElementById('sb').textContent = '분석 중...';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('results').classList.remove('on');
  document.getElementById('loading').classList.add('on');
  runSteps();
  callProxy(q);
}

function runSteps() {
  const ids = ['ls1','ls2','ls3','ls4'];
  ids.forEach(id => document.getElementById(id).className = 'lstep');
  let i = 0;
  const iv = setInterval(() => {
    if (i > 0) document.getElementById(ids[i-1]).className = 'lstep done';
    if (i < ids.length) { document.getElementById(ids[i]).className = 'lstep on'; i++; }
    else clearInterval(iv);
  }, 1500);
}

async function callProxy(query) {
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ query: query, category: curCat })
    });

    const json = await res.json();
    if (!json.ok) throw new Error(json.error || '서버 오류');
    const text = json.data.content[0].text;
    const clean = text.replace(/```json|```/g, '').trim();

    let parsed;
    try { parsed = JSON.parse(clean); }
    catch {
      const m = clean.match(/\{[\s\S]*\}/);
      if (m) parsed = JSON.parse(m[0]);
      else throw new Error('응답 파싱 실패');
    }

    if (parsed.error) throw new Error(parsed.error);
    render(parsed, query);

  } catch(e) {
    document.getElementById('results').innerHTML = `
      <div class="empty"><div class="empty-icon">⚠️</div>
      <div style="font-weight:600;margin-bottom:6px;">분석 오류</div>
      <div style="font-size:12px;color:var(--text2)">${e.message}</div></div>`;
    document.getElementById('results').classList.add('on');
  } finally {
    document.getElementById('loading').classList.remove('on');
    document.getElementById('sb').disabled = false;
    document.getElementById('sb').textContent = '검색 분석 →';
  }
}

function render(d, query) {
  const prods = d.products || [];
  const sum = d.summary || {};
  let h = '';

  h += `<div class="price-hero">
    <div class="ph-card"><div class="ph-label">실시간 최저가</div><div class="ph-value c-blue">${sum.lowestPrice||'-'}</div><div class="ph-sub">웹검색 기준</div></div>
    <div class="ph-card"><div class="ph-label">가격 범위</div><div class="ph-value c-amber" style="font-size:14px;margin-top:5px">${sum.priceRange||'-'}</div><div class="ph-sub">3개 제품 비교</div></div>
    <div class="ph-card"><div class="ph-label">AI 최추천</div><div class="ph-value c-green" style="font-size:12px;line-height:1.35;margin-top:5px">${sum.topPick||'-'}</div><div class="ph-sub">총무팀 최적</div></div>
  </div>`;

  h += `<div class="sec">제품 비교 (${prods.length}개)</div><div class="prod-list">`;

  prods.forEach(p => {
    const isRec = p.recommended;
    let shopHtml = '';
    SHOPS.forEach(s => {
      const sp = p.shopPrices?.[s.id];
      if (!sp || sp.price === '없음') return;
      shopHtml += `<a class="shop-row" href="${shopUrl(s.id, p.name)}" target="_blank" rel="noopener">
        <div class="shop-left">
          <span class="shop-icon">${s.icon}</span>
          <div><div class="shop-name">${s.name}${sp.isLowest?'<span class="lowest-tag">최저</span>':''}</div>
          <div class="shop-note-txt">${s.note}</div></div>
        </div>
        <div class="shop-price-val">${sp.price}</div>
      </a>`;
    });

    h += `<div class="prod-card ${isRec?'rec':''}">
      ${isRec?'<div class="rec-tag">✓ AI 추천</div>':''}
      <div>
        <div class="prod-rank">#${p.rank}</div>
        <div class="prod-name">${p.name}</div>
        <div class="specs">${(p.specs||[]).map(s=>`<span class="spec">${s}</span>`).join('')}</div>
        <div class="pros-cons">
          ${(p.pros||[]).map(x=>`<div class="pro">✓ ${x}</div>`).join('')}
          ${(p.cons||[]).map(x=>`<div class="con">△ ${x}</div>`).join('')}
        </div>
        ${isRec&&p.recommendReason?`<div class="rec-reason">${p.recommendReason}</div>`:''}
      </div>
      <div class="price-panel">
        <div class="price-main-val">${p.price||'-'}</div>
        <div class="price-note">실시간 최저가 기준</div>
        <div class="shops">${shopHtml}</div>
      </div>
    </div>`;
  });
  h += `</div>`;

  if (prods.length > 0 && prods[0].score) {
    const keys = Object.keys(prods[0].score);
    h += `<div class="sec">항목별 점수 비교</div><div class="tbl-wrap" style="margin-bottom:18px"><table>
      <thead><tr><th>제품명</th>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>`;
    prods.forEach(p => {
      h += `<tr><td style="font-weight:600;font-size:11px;max-width:160px">${p.name}</td>
        ${Object.keys(p.score).map(k=>{const v=p.score[k]||0;return`<td><div class="bar-row">
        <div class="bar-bg"><div class="bar-fill" style="width:${v}%"></div></div>
        <span class="bar-num">${v}</span></div></td>`;}).join('')}</tr>`;
    });
    h += `</tbody></table></div>`;
  }

  if (d.aiAnalysis) {
    h += `<div class="ai-wrap">
      <div class="ai-hd">
        <div class="ai-icon-box">🤖</div>
        <div class="ai-hd-text"><div class="t">AI 구매 분석</div><div class="s">총무기획팀 실무 관점 · 실시간 웹검색 기반</div></div>
      </div>
      <div class="ai-body">${d.aiAnalysis}</div>
      ${d.purchaseTip?`<div class="tip-box">💡 <strong>실무 팁:</strong> ${d.purchaseTip}</div>`:''}
    </div>`;
  }

  h += `<div class="sec">전체 쇼핑몰 바로가기</div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px">`;
  SHOPS.forEach(s => {
    h += `<a href="${shopUrl(s.id,query)}" target="_blank" rel="noopener"
      style="display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);
      border-radius:7px;padding:7px 13px;text-decoration:none;color:var(--text2);font-size:12px;transition:border-color .15s"
      onmouseover="this.style.borderColor='#60a5fa'" onmouseout="this.style.borderColor='var(--border)'">
      <span>${s.icon}</span><span style="font-weight:600">${s.name}</span></a>`;
  });
  h += `</div>`;

  document.getElementById('results').innerHTML = h;
  document.getElementById('results').classList.add('on');
}

renderQuickTags();
</script>
</body>
</html>
